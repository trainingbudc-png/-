<!DOCTYPE html>
<html lang="th">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>รายรับ - รายจ่าย (LINE LIFF)</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <link href="https://fonts.googleapis.com/css2?family=Sarabun:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">
  <script src="https://static.line-scdn.net/liff/edge/2/sdk.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
  <style> body { font-family: 'Sarabun', sans-serif; } </style>
</head>
<body class="bg-slate-100 min-h-screen text-slate-800 pb-24">
  
  <div id="loadingPage" class="max-w-md mx-auto bg-white p-8 rounded-2xl shadow-sm mt-10 border border-slate-200 text-center text-slate-500">
    ⏳ กำลังเชื่อมต่อระบบบัญชีกับ LINE...
  </div>

  <div id="loginPage" class="hidden max-w-md mx-auto bg-white p-8 rounded-2xl shadow-sm mt-10 border border-slate-200 m-4">
    <h2 class="text-2xl font-bold mb-6 text-center text-blue-600">รายรับ - รายจ่าย</h2>
    <input id="user" placeholder="Username (เช่น 023)" class="w-full border border-slate-300 p-3 mb-4 rounded-xl outline-none focus:ring-2 focus:ring-blue-500 bg-slate-50 transition">
    <input id="pass" type="password" placeholder="Password" class="w-full border border-slate-300 p-3 mb-6 rounded-xl outline-none focus:ring-2 focus:ring-blue-500 bg-slate-50 transition">
    <button onclick="login()" id="loginBtn" class="w-full bg-blue-600 hover:bg-blue-700 text-white font-bold py-3 rounded-xl transition-all shadow-md">เข้าสู่ระบบ</button>
    
    <div class="flex items-center my-4">
      <div class="flex-1 border-t border-slate-200"></div>
      <span class="px-3 text-slate-400 text-xs uppercase">หรือ</span>
      <div class="flex-1 border-t border-slate-200"></div>
    </div>
    <button onclick="lineLogin()" class="w-full bg-[#06C755] hover:bg-[#05b34c] text-white font-bold py-3 rounded-xl transition-all shadow-md flex items-center justify-center gap-2">
      <svg class="w-5 h-5 fill-current" viewBox="0 0 24 24"><path d="M24 10.304c0-5.222-5.383-9.47-12-9.47S0 5.082 0 10.304c0 4.678 4.253 8.584 10 9.341.389.084.918.257 1.053.589.12.296.079.76.039 1.06l-.169 1.023c-.052.303-.25 1.186 1.081.646 1.331-.54 7.177-4.225 9.792-7.234 1.832-1.993 2.198-3.923 2.198-5.465zm-14.153 3.633h-2.14v-5.2h.714v4.486h1.426v.714zm2.142 0h-.714v-5.2h.714v5.2zm3.327-.714c0 .394-.32.714-.714.714h-1.636v-5.2h.714v4.486h.922c.394 0 .714.32.714.714zm1.902-.714h-1.426v-.931h1.426v-.714h-1.426v-.93h1.426v-.714h-2.14v5.2h2.14v-.711z"/></svg>
      เข้าสู่ระบบด้วย LINE
    </button>
  </div>

  <div id="appPage" class="hidden max-w-lg mx-auto p-4">
    <div class="flex justify-between items-center mb-6 bg-white p-4 rounded-2xl shadow-sm border border-slate-200">
      <h2 id="pageTitle" class="text-xl font-extrabold text-slate-800">📝 บันทึกรายการ</h2>
      <div class="flex items-center gap-2">
        <span id="displayUser" class="bg-blue-100 text-blue-700 px-3 py-1 rounded-full text-sm font-semibold">User</span>
        <button onclick="logout()" class="bg-red-500 hover:bg-red-600 text-white px-3 py-1 rounded-full text-sm font-medium transition-all shadow-sm">🚪</button>
      </div>
    </div>
    
    <div id="tab-form" class="space-y-4">
      <div class="bg-white p-6 rounded-2xl shadow-sm border border-slate-200">
        <h3 class="font-bold text-slate-700 mb-4 flex items-center gap-2">✨ กรอกข้อมูลของคุณ</h3>
        <div class="grid grid-cols-2 gap-3 mb-3">
          <select id="type" class="w-full border border-slate-200 p-3 rounded-xl outline-none focus:ring-2 focus:ring-blue-500 bg-slate-50">
            <option value="รายรับ">รายรับ 📈</option>
            <option value="รายจ่าย">รายจ่าย 📉</option>
          </select>
          <input id="cat" placeholder="หมวดหมู่ (เช่น อาหาร, เงินเดือน)" class="w-full border border-slate-200 p-3 rounded-xl outline-none focus:ring-2 focus:ring-blue-500 bg-slate-50">
        </div>
        <div class="grid grid-cols-2 gap-3 mb-4">
          <input id="amt" type="number" placeholder="จำนวนเงิน" class="w-full border border-slate-200 p-3 rounded-xl outline-none focus:ring-2 focus:ring-blue-500 bg-slate-50">
          <input id="note" placeholder="บันทึกช่วยจำ (ไม่บังคับ)" class="w-full border border-slate-200 p-3 rounded-xl outline-none focus:ring-2 focus:ring-blue-500 bg-slate-50">
        </div>
        <button onclick="save()" id="saveBtn" class="w-full bg-emerald-500 hover:bg-emerald-600 text-white font-bold py-3 rounded-xl transition-all shadow-md">บันทึกข้อมูล</button>
      </div>
    </div>

    <div id="tab-dashboard" class="hidden space-y-6">
      <div class="bg-white p-5 rounded-2xl shadow-sm border border-slate-200">
        <h4 class="text-sm font-bold text-slate-600 mb-3 flex items-center gap-1">📈 กราฟแนวโน้มทางการเงิน (บาท)</h4>
        <div class="w-full h-64">
          <canvas id="trendChart"></canvas>
        </div>
      </div>

      <div id="summary" class="space-y-4"></div>
    </div>

    <div class="fixed bottom-0 left-0 right-0 bg-white border-t border-slate-200 shadow-xl z-50 py-2">
      <div class="max-w-lg mx-auto flex justify-around items-center">
        <button onclick="switchTab('form')" id="btn-tab-form" class="flex flex-col items-center gap-1 text-blue-600 font-bold transition-all">
          <span class="text-2xl">📝</span>
          <span class="text-xs">บันทึกข้อมูล</span>
        </button>
        <button onclick="switchTab('dashboard')" id="btn-tab-dashboard" class="flex flex-col items-center gap-1 text-slate-400 font-medium transition-all">
          <span class="text-2xl">📊</span>
          <span class="text-xs">แดชบอร์ด</span>
        </button>
      </div>
    </div>

  </div>

  <script>
    const API_URL = "https://script.google.com/macros/s/AKfycbwjXVrTaCl5LX7nglWELqvRStIr_Mm943P8I1pemQGhLEAY38uRfYzn8kNnOsi1mjDRoA/exec";
    const LIFF_ID = "2010449814-yzT2aeF3"; 

    let currentUser = "";
    let myChart = null; // ตัวแปรสำหรับเก็บออบเจกต์กราฟ
    
    window.onload = function() {
      liff.init({ liffId: LIFF_ID })
        .then(() => {
          document.getElementById('loadingPage').classList.add('hidden');
          if (liff.isLoggedIn()) {
            liff.getProfile().then(profile => {
              currentUser = profile.displayName; 
              document.getElementById('displayUser').innerText = "👤 " + currentUser;
              document.getElementById('appPage').classList.remove('hidden'); 
              loadSummary(); 
            });
          } else {
            document.getElementById('loginPage').classList.remove('hidden');
          }
        })
        .catch((err) => {
          console.error(err);
          document.getElementById('loadingPage').classList.add('hidden');
          document.getElementById('loginPage').classList.remove('hidden');
        });
    };

    // ฟังก์ชันสลับหน้าจอ (Tab Switcher)
    function switchTab(target) {
        const formTab = document.getElementById('tab-form');
        const dashTab = document.getElementById('tab-dashboard');
        const btnForm = document.getElementById('btn-tab-form');
        const btnDash = document.getElementById('btn-tab-dashboard');
        const title = document.getElementById('pageTitle');

        if (target === 'form') {
            formTab.classList.remove('hidden');
            dashTab.classList.add('hidden');
            btnForm.className = "flex flex-col items-center gap-1 text-blue-600 font-bold";
            btnDash.className = "flex flex-col items-center gap-1 text-slate-400 font-medium";
            title.innerText = "📝 บันทึกรายการ";
        } else if (target === 'dashboard') {
            formTab.classList.add('hidden');
            dashTab.classList.remove('hidden');
            btnForm.className = "flex flex-col items-center gap-1 text-slate-400 font-medium";
            btnDash.className = "flex flex-col items-center gap-1 text-blue-600 font-bold";
            title.innerText = "📊 แดชบอร์ดสรุปผล";
            loadSummary(); // โหลดซ้ำเพื่ออัปเดตข้อมูลและวาดกราฟใหม่ทุกครั้งที่เปิดดู
        }
    }

    function lineLogin() { if (!liff.isLoggedIn()) { liff.login(); } }

    function login() {
      let u = document.getElementById('user').value;
      let p = document.getElementById('pass').value;
      if(!u || !p) return alert("กรุณากรอกข้อมูลให้ครบครับ");
      let btn = document.getElementById('loginBtn');
      btn.innerText = "กำลังตรวจสอบ...";
      
      fetch(`${API_URL}?action=checkLogin&username=${encodeURIComponent(u)}&password=${encodeURIComponent(p)}`)
      .then(res => res.json())
      .then(res => {
        if(res.result) { 
            currentUser = u; 
            document.getElementById('displayUser').innerText = "👤 " + u;
            document.getElementById('loginPage').classList.add('hidden');
            document.getElementById('appPage').classList.remove('hidden');
            loadSummary(); 
            document.getElementById('pass').value = '';
        } else {
            alert('ชื่อหรือรหัสผ่านผิด โปรดลองอีกครั้ง');
            btn.innerText = "เข้าสู่ระบบ";
        }
      }).catch(err => { alert("เกิดข้อผิดพลาด"); btn.innerText = "เข้าสู่ระบบ"; });
    }

    function logout() {
      if(confirm("คุณต้องการออกจากระบบใช่หรือไม่?")) {
          if (liff.isLoggedIn()) { liff.logout(); window.location.reload(); } 
          else { window.location.reload(); }
      }
    }

    function save() {
      let data = { 
          user: currentUser, 
          type: document.getElementById('type').value,
          category: document.getElementById('cat').value,
          amount: document.getElementById('amt').value,
          note: document.getElementById('note').value
      };
      if(!data.category || !data.amount) return alert('กรุณากรอกหมวดหมู่และจำนวนเงินครับ');
      let btn = document.getElementById('saveBtn');
      btn.innerText = "กำลังบันทึก...";

      fetch(`${API_URL}?action=saveData&payload=${encodeURIComponent(JSON.stringify(data))}`)
      .then(res => res.json())
      .then(() => { 
          document.getElementById('cat').value = '';
          document.getElementById('amt').value = '';
          document.getElementById('note').value = '';
          btn.innerText = "บันทึกข้อมูล";
          alert("🎉 บันทึกข้อมูลสำเร็จแล้ว!");
      })
      .catch(err => { alert("บันทึกไม่สำเร็จ"); btn.innerText = "บันทึกข้อมูล"; });
    }

    function parseThaiMonth(dateStr) {
        try {
            if (!dateStr) return "ไม่ระบุเดือน";
            let cleanStr = dateStr.replace(/["']/g, '').trim();
            if (cleanStr.includes('/')) {
                let parts = cleanStr.split('/');
                if (parts.length >= 2) {
                    let monthIdx = parseInt(parts[1], 10) - 1;
                    let yearVal = parseInt(parts[2].split(',')[0].trim(), 10);
                    if (yearVal < 2100) yearVal += 543;
                    const thaiMonths = ["มกราคม", "กุมภาพันธ์", "มีนาคม", "เมษายน", "พฤษภาคม", "มิถุนายน", "กรกฎาคม", "สิงหาคม", "กันยายน", "ตุลาคม", "พฤศจิกายน", "ธันวาคม"];
                    if (monthIdx >= 0 && monthIdx < 12) return thaiMonths[monthIdx] + " " + yearVal;
                }
            }
            let d = new Date(cleanStr);
            if (!isNaN(d.getTime())) return d.toLocaleString('th-TH', { month: 'long', year: 'numeric' });
        } catch (e) { }
        return "มิถุนายน 2569";
    }

    // ฟังก์ชันคำนวณแดชบอร์ดและวาดกราฟเส้นแนวโน้ม
    function loadSummary() {
        let sumDiv = document.getElementById('summary');
        fetch(`${API_URL}?action=getTransactions&username=${encodeURIComponent(currentUser)}`)
        .then(res => res.json())
        .then(response => {
            let data = response.data;
            let monthlyData = {};
            let allTransactions = [];

            if(!data || data.length === 0) {
                sumDiv.innerHTML = '<div class="bg-white p-6 rounded-2xl text-center text-slate-400 border border-slate-200">ยังไม่มีข้อมูลบันทึกในระบบ</div>';
                return;
            }

            data.forEach(row => {
                try {
                    let dateVal = String(row[0] || '');
                    let type = String(row[2] || '');
                    let cat = String(row[3] || '');
                    let amt = Number(row[4]) || 0;
                    let note = String(row[5] || '');
                    if (amt <= 0 || type === '') return; 
                    let mY = parseThaiMonth(dateVal);

                    if (!monthlyData[mY]) {
                        monthlyData[mY] = { incomeTotal: 0, expenseTotal: 0, categories: {} };
                    }
                    
                    if (type.includes('รับ')) {
                        monthlyData[mY].incomeTotal += amt;
                        if (!monthlyData[mY].categories[cat]) monthlyData[mY].categories[cat] = 0;
                        monthlyData[mY].categories[cat] += amt;
                    } else if (type.includes('จ่าย')) {
                        monthlyData[mY].expenseTotal += amt;
                    }
                    allTransactions.unshift({ date: dateVal.split(',')[0], type, cat, amt, note, mY });
                } catch(e) { }
            });

            let months = Object.keys(monthlyData);
            if(months.length === 0) return;

            // 📊 1. ส่วนการประมวลผลวาดคลังกราฟ (Chart.js)
            let chartLabels = [...months].reverse(); // เรียงจากเดือนเก่าไปเดือนใหม่
            let incomeDataset = chartLabels.map(m => monthlyData[m].incomeTotal);
            let expenseDataset = chartLabels.map(m => monthlyData[m].expenseTotal);

            if (myChart) { myChart.destroy(); } // ทำลายกราฟเก่าทิ้งก่อนวาดใหม่ป้องกันซ้อน
            const ctx = document.getElementById('trendChart').getContext('2chart');
            myChart = new Chart(document.getElementById('trendChart'), {
                type: 'line',
                data: {
                    labels: chartLabels,
                    datasets: [
                        { label: 'รายได้รวม', data: incomeDataset, borderColor: '#10B981', backgroundColor: '#10B98120', tension: 0.3, fill: true, borderWidth: 3 },
                        { label: 'รายจ่ายรวม', data: expenseDataset, borderColor: '#EF4444', backgroundColor: '#EF444410', tension: 0.3, fill: true, borderWidth: 2 }
                    ]
                },
                options: { responsive: true, maintainAspectRatio: false, plugins: { legend: { position: 'top' } } }
            });

            // 📂 2. ส่วนการเขียนข้อมูลแสดงการ์ดสรุปรายเดือนด้านล่างกราฟ
            let html = '';
            months.forEach(m => {
                let incTotal = monthlyData[m].incomeTotal;
                let expTotal = monthlyData[m].expenseTotal;
                let netProfit = incTotal - expTotal;

                html += `
                <div class="bg-white p-5 rounded-2xl shadow-sm border border-slate-200">
                    <div class="font-extrabold text-emerald-600 mb-3 pb-2 border-b border-emerald-100 text-base">📅 รอบเดือน: ${m}</div>
                    <div class="bg-gradient-to-br from-emerald-500 to-teal-600 text-white p-4 rounded-xl text-center mb-4">
                        <span class="text-[11px] opacity-90 block">รายได้รวมเดือนนี้</span>
                        <span class="text-2xl font-black">${incTotal.toLocaleString()} ฿</span>
                    </div>
                    <div class="mb-4 bg-slate-50 p-3 rounded-xl">
                        <div class="text-xs font-bold text-slate-500 mb-2">📊 สัดส่วนรายได้</div>
                        <div class="space-y-2">`;

                let cats = monthlyData[m].categories;
                Object.keys(cats).forEach(cName => {
                    let cAmt = cats[cName];
                    let percent = ((cAmt / incTotal) * 100).toFixed(1);
                    html += `
                        <div>
                            <div class="flex justify-between text-xs text-slate-700 mb-0.5"><span>🎯 ${cName}</span><span>${cAmt.toLocaleString()} ฿ (${percent}%)</span></div>
                            <div class="w-full bg-slate-200 h-1.5 rounded-full overflow-hidden"><div class="bg-emerald-500 h-full" style="width: ${percent}%"></div></div>
                        </div>`;
                });

                html += ` </div></div>
                    <div class="flex justify-between text-xs text-slate-500 font-medium pt-1">
                        <span>📉 รายจ่ายรวม: <span class="text-red-500 font-semibold">-${expTotal.toLocaleString()} ฿</span></span>
                        <span>💰 คงเหลือ: <span class="${netProfit >= 0 ? 'text-emerald-600' : 'text-red-500'} font-bold">${netProfit.toLocaleString()} ฿</span></span>
                    </div>
                </div>`;
            });
            sumDiv.innerHTML = html;
        }).catch(err => { console.error(err); });
    }
  </script>
</body>
</html>
