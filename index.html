<!DOCTYPE html>
<html lang="th">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>รายรับ - รายจ่าย (LINE LIFF)</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <link href="https://fonts.googleapis.com/css2?family=Sarabun:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">
  <script src="https://static.line-scdn.net/liff/edge/2/sdk.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
  <style>
    body { font-family: 'Sarabun', sans-serif; background-color: #f3f4f6; }
    .custom-shadow { box-shadow: 0 10px 25px -5px rgba(0, 0, 0, 0.05), 0 8px 10px -6px rgba(0, 0, 0, 0.05); }
    ::-webkit-scrollbar { width: 6px; }
    ::-webkit-scrollbar-track { background: transparent; }
    ::-webkit-scrollbar-thumb { background: #cbd5e1; border-radius: 10px; }
  </style>
</head>
<body class="min-h-screen pb-24 text-slate-700 bg-slate-50/50">
  
  <div id="loadingPage" class="fixed inset-0 z-50 flex flex-col items-center justify-center bg-slate-50">
    <div class="w-10 h-10 border-4 border-blue-600 border-t-transparent rounded-full animate-spin mb-3"></div>
    <p class="text-xs font-medium text-slate-400">กำลังเชื่อมต่อระบบบัญชี...</p>
  </div>

  <div id="loginPage" class="hidden max-w-md mx-auto pt-24 px-4">
    <div class="bg-white p-8 rounded-3xl custom-shadow border border-slate-100 text-center">
      <h2 class="text-2xl font-extrabold text-blue-600 mb-6 tracking-tight">รายรับ - รายจ่าย</h2>
      <div class="space-y-3">
        <input id="user" placeholder="Username (เช่น 023)" class="w-full border border-slate-200 p-3.5 rounded-xl outline-none focus:ring-2 focus:ring-blue-500/20 focus:border-blue-500 transition-all text-sm bg-slate-50/50">
        <input id="pass" type="password" placeholder="Password" class="w-full border border-slate-200 p-3.5 rounded-xl outline-none focus:ring-2 focus:ring-blue-500/20 focus:border-blue-500 transition-all text-sm bg-slate-50/50">
      </div>
      <button onclick="login()" id="loginBtn" class="w-full mt-5 bg-blue-600 hover:bg-blue-700 text-white font-bold py-3.5 rounded-xl transition-all shadow-md shadow-blue-600/10 text-sm">เข้าสู่ระบบ</button>
      
      <div class="flex items-center my-5">
        <div class="flex-1 border-t border-slate-100"></div>
        <span class="px-3 text-slate-300 text-[10px] tracking-wider font-bold">หรือ</span>
        <div class="flex-1 border-t border-slate-100"></div>
      </div>
      
      <button onclick="lineLogin()" class="w-full bg-[#06C755] hover:bg-[#05b34c] text-white font-bold py-3.5 rounded-xl transition-all flex items-center justify-center gap-2 text-sm shadow-sm">
        <svg class="w-4 h-4 fill-current" viewBox="0 0 24 24"><path d="M24 10.304c0-5.222-5.383-9.47-12-9.47S0 5.082 0 10.304c0 4.678 4.253 8.584 10 9.341.389.084.918.257 1.053.589.12.296.079.76.039 1.06l-.169 1.023c-.052.303-.25 1.186 1.081.646 1.331-.54 7.177-4.225 9.792-7.234 1.832-1.993 2.198-3.923 2.198-5.465zm-14.153 3.633h-2.14v-5.2h.714v4.486h1.426v.714zm2.142 0h-.714v-5.2h.714v5.2zm3.327-.714c0 .394-.32.714-.714.714h-1.636v-5.2h.714v4.486h.922c.394 0 .714.32.714.714zm1.902-.714h-1.426v-.931h1.426v-.714h-1.426v-.93h1.426v-.714h-2.14v5.2h2.14v-.711z"/></svg>
        เข้าสู่ระบบด้วย LINE
      </button>
    </div>
  </div>

  <div id="appPage" class="hidden max-w-md mx-auto p-4 space-y-4 pt-4">
    
    <div class="bg-white p-4 rounded-2xl border border-slate-100 flex justify-between items-center custom-shadow">
      <h2 id="pageTitle" class="text-base font-extrabold text-slate-800 tracking-tight flex items-center gap-2">📝 รายรับ - รายจ่าย</h2>
      <div class="flex items-center gap-2">
        <span id="displayUser" class="bg-blue-50 text-blue-600 px-3 py-1 rounded-xl text-xs font-bold border border-blue-100/50">023</span>
        <button onclick="logout()" class="px-3 py-1 bg-rose-50 hover:bg-rose-100 text-rose-600 rounded-xl text-xs font-bold transition-all border border-rose-100">ออกจากระบบ 🚪</button>
      </div>
    </div>
    
    <div id="tab-form" class="space-y-4">
      <div class="bg-white p-5 rounded-2xl border border-slate-100 custom-shadow">
        <h3 class="font-extrabold text-xs text-slate-800 mb-4 flex items-center gap-1.5">
          ✨ เพิ่มรายการใหม่
        </h3>
        
        <div class="grid grid-cols-2 gap-3 mb-3">
          <div>
            <select id="type" onchange="updateCategoryOptions()" class="w-full border border-slate-200 p-3 rounded-xl outline-none focus:ring-2 focus:ring-blue-500/20 focus:border-blue-500 bg-slate-50 font-semibold text-xs transition-all cursor-pointer">
              <option value="รายรับ">รายรับ 📈</option>
              <option value="รายจ่าย">รายจ่าย 📉</option>
            </select>
          </div>
          <div>
            <select id="cat" class="w-full border border-slate-200 p-3 rounded-xl outline-none focus:ring-2 focus:ring-blue-500/20 focus:border-blue-500 bg-slate-50 font-semibold text-xs transition-all cursor-pointer">
            </select>
          </div>
        </div>
        
        <div class="grid grid-cols-2 gap-3 mb-4">
          <input id="amt" type="number" placeholder="จำนวนเงิน" class="w-full border border-slate-200 p-3 rounded-xl outline-none focus:ring-2 focus:ring-blue-500/20 focus:border-blue-500 bg-slate-50 font-bold text-xs transition-all">
          <input id="note" placeholder="บันทึกช่วยจำ (ไม่บังคับ)" class="w-full border border-slate-200 p-3 rounded-xl outline-none focus:ring-2 focus:ring-blue-500/20 focus:border-blue-500 bg-slate-50 text-xs transition-all">
        </div>
        
        <button onclick="save()" id="saveBtn" class="w-full bg-[#10b981] hover:bg-[#0ea5e9] text-white font-extrabold py-3 rounded-xl transition-all shadow-md shadow-emerald-500/10 text-xs tracking-wide">บันทึกข้อมูล</button>
      </div>

      <div class="bg-white p-5 rounded-2xl border border-slate-100 custom-shadow space-y-4">
        <div class="flex justify-between items-center">
          <span class="text-xs font-extrabold text-slate-800 flex items-center gap-1">
            🕒 รายละเอียดประวัติรายการเข้า - ออก
          </span>
          <span id="history-count" class="text-[10px] font-bold bg-slate-100 text-slate-500 px-2 py-0.5 rounded-full">0 รายการ</span>
        </div>
        
        <div class="bg-slate-50 p-3.5 rounded-xl border border-slate-100 text-xs space-y-2">
          <div class="grid grid-cols-2 gap-3">
            <input type="date" id="history-start" onchange="renderHistory()" class="w-full bg-white border border-slate-200 p-2.5 rounded-xl text-[11px] font-medium text-slate-600 outline-none">
            <input type="date" id="history-end" onchange="renderHistory()" class="w-full bg-white border border-slate-200 p-2.5 rounded-xl text-[11px] font-medium text-slate-600 outline-none">
          </div>
          <div class="flex justify-end"><button onclick="clearHistoryFilter()" class="text-[10px] text-rose-500 font-semibold hover:underline">ล้างตัวกรอง</button></div>
        </div>

        <div id="history-list" class="space-y-2.5 max-h-[320px] overflow-y-auto pr-0.5">
          <p class="text-center text-slate-400 text-xs py-4">⏳ กำลังโหลดข้อมูล...</p>
        </div>
      </div>
    </div>

    <div id="tab-dashboard" class="hidden space-y-4">
      
      <div class="bg-white p-4 rounded-2xl border border-slate-100 custom-shadow space-y-2">
        <div class="grid grid-cols-2 gap-2">
          <input type="date" id="dash-start" onchange="renderDashboard()" class="w-full bg-slate-50 border border-slate-200 p-2 rounded-lg text-[11px] font-medium text-slate-600 outline-none">
          <input type="date" id="dash-end" onchange="renderDashboard()" class="w-full bg-slate-50 border border-slate-200 p-2 rounded-lg text-[11px] font-medium text-slate-600 outline-none">
        </div>
        <div class="flex justify-end"><button onclick="clearDashFilter()" class="text-[10px] text-rose-500 hover:underline">ล้างตัวกรอง</button></div>
      </div>

      <div class="bg-white p-5 rounded-2xl border border-slate-100 custom-shadow">
        <h4 class="text-xs font-extrabold text-slate-700 mb-4 flex items-center gap-1">
          📊 กราฟแนวโน้มทางการเงิน (บาท)
        </h4>
        <div class="w-full h-52">
          <canvas id="trendChart"></canvas>
        </div>
      </div>

      <div id="summary" class="space-y-4"></div>
    </div>

    <div class="fixed bottom-0 left-0 right-0 bg-white border-t border-slate-200 shadow-lg z-50 py-2.5">
      <div class="max-w-md mx-auto flex justify-around items-center">
        <button onclick="switchTab('form')" id="btn-tab-form" class="flex flex-col items-center gap-0.5 text-blue-600 font-extrabold transition-all">
          <span class="text-lg">📝</span>
          <span class="text-[11px]">บันทึกข้อมูล</span>
        </button>
        <button onclick="switchTab('dashboard')" id="btn-tab-dashboard" class="flex flex-col items-center gap-0.5 text-slate-400 font-semibold transition-all">
          <span class="text-lg">📊</span>
          <span class="text-[11px]">แดชบอร์ดสรุป</span>
        </button>
      </div>
    </div>

  </div>

  <script>
    const API_URL = "https://script.google.com/macros/s/AKfycbwjXVrTaCl5LX7nglWELqvRStIr_Mm943P8I1pemQGhLEAY38uRfYzn8kNnOsi1mjDRoA/exec";
    const LIFF_ID = "2010449814-yzT2aeF3";

    let currentUser = "";
    let myChart = null;
    let cacheData = []; 

    const categoryMap = {
        "รายรับ": [
            "เงินเดือน / ค่าจ้าง (Salary / Wages)",
            "ธุรกิจ / งานเสริม (Business / Freelance)",
            "การลงทุน / ดอกเบี้ย (Investment / Interest)",
            "รายรับอื่นๆ (Others)"
        ],
        "รายจ่าย": [
            "อาหาร / เครื่องดื่ม (Food & Drinks)",
            "เดินทาง / ค่านーんมัน (Transportation)",
            "ที่อยู่อาศัย / ค่าน้ำไฟ (Housing & Utilities)",
            "ช้อปปิ้ง / บันเทิง (Shopping & Entertainment)",
            "ผ่อนรถ / หนี้สิน / ประกัน (Loans & Insurance)",
            "สุขภาพ / ของใช้ส่วนตัว (Medical & Personal Care)",
            "รายจ่ายอื่นๆ (Others)"
        ]
    };
    
    window.onload = function() {
      updateCategoryOptions();
      liff.init({ liffId: LIFF_ID })
        .then(() => {
          document.getElementById('loadingPage').classList.add('hidden');
          if (liff.isLoggedIn()) {
            liff.getProfile().then(profile => {
              currentUser = profile.displayName;
              document.getElementById('displayUser').innerText = currentUser;
              document.getElementById('appPage').classList.remove('hidden');
              fetchRawData();
            });
          } else {
            document.getElementById('loginPage').classList.remove('hidden');
          }
        })
        .catch((err) => {
          console.error(err);
          document.getElementById('loadingPage').classList.add('hidden');
          document.getElementById('loginPage').classList.remove('hidden');
        });
    };

    function updateCategoryOptions() {
        const typeSelect = document.getElementById('type').value;
        const catSelect = document.getElementById('cat');
        const options = categoryMap[typeSelect] || [];
        catSelect.innerHTML = options.map(opt => `<option value="${opt}">${opt}</option>`).join('');
    }

    function switchTab(target) {
        const formTab = document.getElementById('tab-form');
        const dashTab = document.getElementById('tab-dashboard');
        const btnForm = document.getElementById('btn-tab-form');
        const btnDash = document.getElementById('btn-tab-dashboard');
        const title = document.getElementById('pageTitle');

        if (target === 'form') {
            formTab.classList.remove('hidden');
            dashTab.classList.add('hidden');
            btnForm.className = "flex flex-col items-center gap-0.5 text-blue-600 font-extrabold transition-all";
            btnDash.className = "flex flex-col items-center gap-0.5 text-slate-400 font-semibold transition-all";
            title.innerText = "📝 รายรับ - รายจ่าย";
            renderHistory(); 
        } else if (target === 'dashboard') {
            formTab.classList.add('hidden');
            dashTab.classList.remove('hidden');
            btnForm.className = "flex flex-col items-center gap-0.5 text-slate-400 font-semibold transition-all";
            btnDash.className = "flex flex-col items-center gap-0.5 text-blue-600 font-extrabold transition-all";
            title.innerText = "📊 แดชบอร์ดสรุปรายเดือน";
            renderDashboard(); 
        }
    }

    function lineLogin() { if (!liff.isLoggedIn()) { liff.login(); } }

    function login() {
      let u = document.getElementById('user').value;
      let p = document.getElementById('pass').value;
      if(!u || !p) return alert("กรุณากรอกข้อมูลให้ครบครับ");
      let btn = document.getElementById('loginBtn');
      btn.innerText = "กำลังตรวจสอบ...";
      
      fetch(`${API_URL}?action=checkLogin&username=${encodeURIComponent(u)}&password=${encodeURIComponent(p)}`)
      .then(res => res.json())
      .then(res => {
        if(res.result) {
            currentUser = u;
            document.getElementById('displayUser').innerText = u;
            document.getElementById('loginPage').classList.add('hidden');
            document.getElementById('appPage').classList.remove('hidden');
            fetchRawData();
            document.getElementById('pass').value = '';
        } else {
            alert('ชื่อหรือรหัสผ่านผิด โปรดลองอีกครั้ง');
            btn.innerText = "เข้าสู่ระบบ";
        }
      }).catch(err => { alert("เกิดข้อผิดพลาด"); btn.innerText = "เข้าสู่ระบบ"; });
    }

    function logout() {
      if(confirm("คุณต้องการออกจากระบบใช่หรือไม่?")) {
          if (liff.isLoggedIn()) { liff.logout(); window.location.reload(); }
          else { window.location.reload(); }
      }
    }

    function save() {
      let data = {
          user: currentUser,
          type: document.getElementById('type').value,
          category: document.getElementById('cat').value,
          amount: document.getElementById('amt').value,
          note: document.getElementById('note').value
      };
      if(!data.category || !data.amount) return alert('กรุณากรอกข้อมูลให้ครบถ้วนครับ');
      let btn = document.getElementById('saveBtn');
      btn.innerText = "กำลังบันทึกข้อมูล...";

      fetch(`${API_URL}?action=saveData&payload=${encodeURIComponent(JSON.stringify(data))}`)
      .then(res => res.json())
      .then(() => {
          document.getElementById('amt').value = '';
          document.getElementById('note').value = '';
          btn.innerText = "บันทึกข้อมูล";
          alert("🎉 บันทึกข้อมูลสำเร็จเรียบร้อย!");
          fetchRawData();
      })
      .catch(err => { alert("บันทึกไม่สำเร็จ"); btn.innerText = "บันทึกข้อมูล"; });
    }

    function convertToJSDate(dateStr) {
        try {
            if(!dateStr) return null;
            let cleanStr = dateStr.replace(/["']/g, '').trim();
            if(cleanStr.includes('/')) {
                let parts = cleanStr.split('/');
                let day = parseInt(parts[0], 10);
                let month = parseInt(parts[1], 10) - 1;
                let year = parseInt(parts[2].split(',')[0].trim(), 10);
                if(year > 2400) year -= 543; 
                return new Date(year, month, day);
            }
            let d = new Date(cleanStr);
            if(!isNaN(d.getTime())) return d;
        } catch(e){}
        return null;
    }

    function parseThaiMonthFromDate(jsDate) {
        if(!jsDate) return "ไม่ระบุเดือน";
        const thaiMonths = ["มกราคม", "กุมภาพันธ์", "มีนาคม", "เมษายน", "พฤษภาคม", "มิถุนายน", "กรกฎาคม", "สิงหาคม", "กันยายน", "ตุลาคม", "พฤศจิกายน", "ธันวาคม"];
        return "รอบเดือน: " + thaiMonths[jsDate.getMonth()] + " " + (jsDate.getFullYear() + 543);
    }

    function fetchRawData() {
        fetch(`${API_URL}?action=getTransactions&username=${encodeURIComponent(currentUser)}`)
        .then(res => res.json())
        .then(response => {
            cacheData = response.data || [];
            renderHistory();
            renderDashboard();
        }).catch(err => { console.error(err); });
    }

    function clearHistoryFilter() {
        document.getElementById('history-start').value = '';
        document.getElementById('history-end').value = '';
        renderHistory();
    }

    function renderHistory() {
        let historyDiv = document.getElementById('history-list');
        let countSpan = document.getElementById('history-count');
        
        let startVal = document.getElementById('history-start').value;
        let endVal = document.getElementById('history-end').value;
        let startDate = startVal ? new Date(startVal).setHours(0,0,0,0) : null;
        let endDate = endVal ? new Date(endVal).setHours(23,59,59,999) : null;

        let filtered = [];

        cacheData.forEach(row => {
            let jsDate = convertToJSDate(row[0]);
            let type = String(row[2] || '');
            let cat = String(row[3] || '');
            let amt = Number(row[4]) || 0;
            let note = String(row[5] || '');

            if (amt <= 0 || type === '' || !jsDate) return;
            if (startDate && jsDate.getTime() < startDate) return;
            if (endDate && jsDate.getTime() > endDate) return;

            filtered.push({
                fullDate: row[0],
                type, cat, amt, note, timestamp: jsDate.getTime()
            });
        });

        filtered.sort((a,b) => b.timestamp - a.timestamp);
        countSpan.innerText = `${filtered.length} รายการ`;

        if(filtered.length === 0) {
            historyDiv.innerHTML = '<p class="text-center text-slate-400 text-xs py-6">ไม่พบข้อมูลประวัติรายการ</p>';
            return;
        }

        let html = '';
        filtered.forEach(t => {
            let isInc = t.type.includes('รับ');
            let displayCat = t.cat.split('/')[0].trim(); 
            
            // ใช้โครงสร้าง flex-row ร่วมกับ justify-between และแยกฝั่งจำนวนเงินให้มีขนาดคงที่ (flex-shrink-0) เพื่อแก้ปัญหาตัวเลขเบียด
            html += `
                <div class="flex items-center justify-between bg-white p-4 rounded-xl text-xs border border-slate-100 hover:bg-slate-50/80 transition-all gap-4">
                    <div class="flex items-center gap-3 min-w-0">
                        <span class="w-2.5 h-2.5 rounded-full flex-shrink-0 ${isInc ? 'bg-emerald-500' : 'bg-rose-500'}"></span>
                        <div class="min-w-0">
                            <span class="font-extrabold text-slate-800 block text-[13px] truncate">${displayCat}</span>
                            <span class="font-medium text-slate-400 text-[10px] block mt-0.5">${t.fullDate}</span>
                            ${t.note ? `<span class="text-[10px] text-slate-400 block italic mt-1 bg-slate-50 px-1.5 py-0.5 rounded border border-slate-100 truncate">${t.note}</span>` : ''}
                        </div>
                    </div>
                    <div class="flex-shrink-0 text-right">
                        <span class="${isInc ? 'text-emerald-600 bg-emerald-50/70' : 'text-rose-500 bg-rose-50/70'} px-3 py-1.5 rounded-lg font-black text-[13px] tracking-wide inline-block">
                            ${isInc ? '+' : '-'}${t.amt.toLocaleString()} ฿
                        </span>
                    </div>
                </div>`;
        });
        historyDiv.innerHTML = html;
    }

    function clearDashFilter() {
        document.getElementById('dash-start').value = '';
        document.getElementById('dash-end').value = '';
        renderDashboard();
    }

    function renderDashboard() {
        let sumDiv = document.getElementById('summary');
        let startVal = document.getElementById('dash-start').value;
        let endVal = document.getElementById('dash-end').value;
        let startDate = startVal ? new Date(startVal).setHours(0,0,0,0) : null;
        let endDate = endVal ? new Date(endVal).setHours(23,59,59,999) : null;

        let monthlyData = {};
        let dailyChartData = {}; 

        cacheData.forEach(row => {
            let jsDate = convertToJSDate(row[0]);
            let type = String(row[2] || '');
            let cat = String(row[3] || '');
            let amt = Number(row[4]) || 0;

            if (amt <= 0 || type === '' || !jsDate) return;
            if (startDate && jsDate.getTime() < startDate) return;
            if (endDate && jsDate.getTime() > endDate) return;

            let yyyy = jsDate.getFullYear();
            let mm = String(jsDate.getMonth() + 1).padStart(2, '0');
            let dd = String(jsDate.getDate()).padStart(2, '0');
            let dayKey = `${yyyy}-${mm}-${dd}`;
            let dayDisplay = jsDate.toLocaleDateString('th-TH', {day:'numeric', month:'short'});

            if (!dailyChartData[dayKey]) {
                dailyChartData[dayKey] = { label: dayDisplay, income: 0, expense: 0 };
            }

            let mY = parseThaiMonthFromDate(jsDate);
            if (!monthlyData[mY]) {
                monthlyData[mY] = { incomeTotal: 0, expenseTotal: 0, categories: {} };
            }
            
            if (type.includes('รับ')) {
                dailyChartData[dayKey].income += amt;
                monthlyData[mY].incomeTotal += amt;
                if (!monthlyData[mY].categories[cat]) monthlyData[mY].categories[cat] = 0;
                monthlyData[mY].categories[cat] += amt;
            } else if (type.includes('จ่าย')) {
                dailyChartData[dayKey].expense += amt;
                monthlyData[mY].expenseTotal += amt;
                if (!monthlyData[mY].categories[cat]) monthlyData[mY].categories[cat] = 0;
                monthlyData[mY].categories[cat] += amt;
            }
        });

        let months = Object.keys(monthlyData);
        let dayKeys = Object.keys(dailyChartData);

        if(dayKeys.length === 0) {
            sumDiv.innerHTML = '<p class="text-center text-slate-400 text-xs py-6">ไม่มีข้อมูลวิเคราะห์ในช่วงเวลานี้</p>';
            if(myChart) { myChart.destroy(); myChart = null; }
            return;
        }

        dayKeys.sort(); 
        let chartLabels = dayKeys.map(k => dailyChartData[k].label);
        let incomeDataset = dayKeys.map(k => dailyChartData[k].income);
        let expenseDataset = dayKeys.map(k => dailyChartData[k].expense);

        if (myChart) { myChart.destroy(); }
        myChart = new Chart(document.getElementById('trendChart'), {
            type: 'line',
            data: {
                labels: chartLabels,
                datasets: [
                    { label: 'รายได้', data: incomeDataset, borderColor: '#10b981', backgroundColor: '#10b98108', tension: 0.15, fill: true, borderWidth: 3, pointBackgroundColor: '#10b981' },
                    { label: 'รายจ่าย', data: expenseDataset, borderColor: '#ef4444', backgroundColor: '#ef444404', tension: 0.15, fill: true, borderWidth: 2.5, pointBackgroundColor: '#ef4444' }
                ]
            },
            options: { 
                responsive: true, 
                maintainAspectRatio: false, 
                plugins: { legend: { labels: { font: { family: 'Sarabun', size: 11, weight: '500' } } } },
                scales: { 
                    x: { grid: { display: false }, ticks: { font: { family: 'Sarabun', size: 10 } } },
                    y: { ticks: { font: { family: 'Sarabun', size: 10 } } }
                }
            }
        });

        let html = '';
        months.forEach(m => {
            let incTotal = monthlyData[m].incomeTotal;
            let expTotal = monthlyData[m].expenseTotal;
            let netProfit = incTotal - expTotal;

            html += `
            <div class="bg-white p-5 rounded-2xl border border-slate-100 custom-shadow space-y-4">
                <div class="font-extrabold text-slate-800 text-sm pb-1.5 border-b border-slate-100 flex items-center gap-1">
                    📅 ${m}
                </div>

                <div class="grid grid-cols-3 gap-2">
                    <div class="bg-emerald-50/60 p-2.5 rounded-xl border border-emerald-100 text-center">
                        <span class="text-[10px] text-emerald-600 font-bold block mb-0.5">รายรับรวม</span>
                        <span class="text-xs font-black text-emerald-700">${incTotal.toLocaleString()} ฿</span>
                    </div>
                    <div class="bg-rose-50/60 p-2.5 rounded-xl border border-rose-100 text-center">
                        <span class="text-[10px] text-rose-500 font-bold block mb-0.5">รายจ่ายรวม</span>
                        <span class="text-xs font-black text-rose-700">-${expTotal.toLocaleString()} ฿</span>
                    </div>
                    <div class="bg-teal-50/60 p-2.5 rounded-xl border border-teal-100 text-center">
                        <span class="text-[10px] text-teal-600 font-bold block mb-0.5">คงเหลือ</span>
                        <span class="text-xs font-black text-teal-700">${netProfit >= 0 ? '+' : ''}${netProfit.toLocaleString()} ฿</span>
                    </div>
                </div>

                <div class="bg-slate-50/80 p-3.5 rounded-xl border border-slate-100">
                    <div class="text-[10px] font-extrabold text-slate-400 mb-2.5 tracking-wide uppercase">📊 สัดส่วนตามแต่ละหมวดหมู่</div>
                    <div class="space-y-2.5">`;

            let cats = monthlyData[m].categories;
            Object.keys(cats).forEach(cName => {
                let cAmt = cats[cName];
                let isIncomeCat = categoryMap["รายรับ"].includes(cName);
                let baseTotal = isIncomeCat ? incTotal : expTotal;
                let percent = baseTotal > 0 ? ((cAmt / baseTotal) * 100).toFixed(1) : 0;
                let cleanName = cName.split('/')[0].trim();

                html += `
                    <div>
                        <div class="flex justify-between text-[11px] text-slate-600 mb-1">
                            <span>${isIncomeCat ? '📈' : '📉'} ${cleanName}</span>
                            <span class="font-bold text-slate-700">${cAmt.toLocaleString()} ฿ (${percent}%)</span>
                        </div>
                        <div class="w-full bg-slate-200 h-1 rounded-full overflow-hidden">
                            <div class="${isIncomeCat ? 'bg-emerald-500' : 'bg-rose-500'} h-full rounded-full" style="width: ${percent}%"></div>
                        </div>
                    </div>`;
            });

            html += `   </div>
                </div>
            </div>`;
        });
        sumDiv.innerHTML = html;
    }
  </script>
</body>
</html>
